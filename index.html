<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8" />
<title>የፖሊስ ሪፖርት ሲስተም</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- PWA (Mobile App Like) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f4037">

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:linear-gradient(135deg,#1f4037,#99f2c8);} 
.container{max-width:1100px;margin:auto;padding:20px;} 
.card{background:white;border-radius:15px;padding:20px;margin-top:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2);} 
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;} 
button{background:#28a745;color:white;padding:10px;border:none;border-radius:8px;cursor:pointer;} 
button:hover{background:#218838;} 
.hidden{display:none;} 
.report-item{background:#f1f1f1;margin:10px 0;padding:10px;border-radius:10px;cursor:pointer;} 
#map{height:300px;margin-top:10px;border-radius:10px;} 
.popup{position:fixed;top:20px;right:20px;background:#ff4444;color:white;padding:15px;border-radius:10px;display:none;} 
</style>
</head>

<body>
<div class="popup" id="popup">🔔 አዲስ ሪፖርት!</div>

<div class="container">
<h2>🇪🇹 የፖሊስ ሪፖርት ሲስተም</h2>
<h4 style="color:gold;font-weight:bold;">ቤንሻንጉል ጉምዝ ክልል ፖሊስ ኮሚሽን</h4>

<div class="card" id="loginBox">
<input id="email" placeholder="email" />
<input id="password" type="password" placeholder="password" />
<button id="loginBtn">Login</button>
</div>

<div id="policeDash" class="hidden">
<div class="card">
<h3>🔔 <span id="notify">0</span></h3>
<div id="reports"></div>
<h3>📊 Analytics</h3>
<canvas id="chart"></canvas>
<h3>📍 Heatmap</h3>
<div id="map"></div>
<h3>🧠 AI Prediction</h3>
<div id="ai"></div>
</div>
</div>

</div>

<script type="module">
import { db, auth, collection, onSnapshot } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const popup=document.getElementById("popup");
const loginBtn=document.getElementById("loginBtn");
let allReports=[];
let map,chart;

loginBtn.onclick=async()=>{
 try{
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;
  await signInWithEmailAndPassword(auth,email,password);
  loginBox.style.display="none";
  policeDash.classList.remove("hidden");
  initMap();
  realtime();
 }catch(e){alert(e.message)}
};

function realtime(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  popup.style.display="block";
  setTimeout(()=>popup.style.display="none",3000);

  allReports=[];
  snap.forEach(doc=>allReports.push(doc.data()));
  notify.innerText=snap.size;
  render();
 });
}

function initMap(){
 map=L.map('map').setView([9,38],6);
 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function render(){
 reports.innerHTML="";
 let zones={};
 let timeline={};

 allReports.forEach((d,i)=>{
  reports.innerHTML+=`<div class='report-item'>${d.zone}-${d.crime}</div>`;

  zones[d.zone]=(zones[d.zone]||0)+1;
  timeline[i]=zones[d.zone];

  if(d.lat && d.lng){
   let color = zones[d.zone]>2 ? "red" : "blue";
   L.circle([d.lat,d.lng],{color}).addTo(map);
  }
 });

 drawChart(zones);
 aiPrediction(timeline);
}

function drawChart(z){
 if(chart) chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:'bar',
  data:{labels:Object.keys(z),datasets:[{data:Object.values(z)}]}
 });
}

// 🔥 REAL AI (Simple ML Prediction)
function aiPrediction(data){
 let values=Object.values(data);
 if(values.length<2){ai.innerHTML="No data";return}

 let trend = values[values.length-1] - values[0];
 let prediction = values[values.length-1] + trend;

 ai.innerHTML=`📈 Trend: ${trend}<br>🔮 Next Prediction: ${prediction}`;
}

// 📱 PWA Service Worker
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}

</script>
</body>
</html>
