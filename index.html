<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8" />
<title>የፖሊስ ሪፖርት ሲስተም</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:linear-gradient(135deg,#1f4037,#99f2c8);} 
.container{max-width:1100px;margin:auto;padding:20px;} 
.card{background:white;border-radius:15px;padding:20px;margin-top:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2);} 
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;} 
button{background:#28a745;color:white;padding:10px;border:none;border-radius:8px;cursor:pointer;} 
.hidden{display:none;} 
.report-item{margin:10px 0;padding:10px;border-radius:10px;cursor:pointer;} 
.new{background:#ffe6e6;border-left:5px solid red;}
.read{background:#e6f7ff;}
.header{text-align:center;margin-bottom:20px;}
.gold-text{font-weight:bold;font-size:18px;color:gold;text-shadow:0 0 8px red;}
.footer{text-align:center;margin-top:30px;color:gold;font-weight:bold;}
.hero{text-align:center;margin-top:10px;}
.hero img{width:100%;max-height:250px;object-fit:cover;border-radius:12px;}
</style>
</head>

<body>
<div class="container">

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/71/Flag_of_Ethiopia.svg" style="width:120px;">
<h2>🇪🇹 የ7ኛዉ ሀገራዊ ምርጫ የፀጥታ ሪፖርት ሲስተም</h2>
<div class="gold-text">
ቤንሻንጉል ጉሙዝ ክልል ፖሊስ ኮሚሽን እና ቤንሻንጉል ጉሙዝ ክልል ሠላም ግንባታና ፀጥታ ቢሮ የተዘጋጀ
</div>
</div>

<div class="hero">
<img src="https://images.unsplash.com/photo-1581090700227-4c4b1b2c9b3f">
<h3 style="color:white;">በጀግንነት መጠበቅ በሰብዓዊነት ማገልገል</h3>
</div>

<div class="card" id="loginBox">
<input id="email" placeholder="email" />
<input id="password" type="password" placeholder="password" />
<button id="loginBtn">Login</button>
</div>

<div id="weredaDash" class="hidden">
<div class="card">
<h3>📋 ሪፖርት</h3>
<input id="region" placeholder="ክልል" />
<input id="zone" placeholder="ዞን" />
<input id="wereda" placeholder="ወረዳ" />
<input id="station" placeholder="ጣቢያ" />
<input id="crime" placeholder="ወንጀል" />
<textarea id="desc" placeholder="መግለጫ"></textarea>
<button id="sendBtn">📤 ላክ</button>
</div>

<div class="card">
<h3>📂 የእርስዎ ሪፖርቶች</h3>
<div id="myReports"></div>
</div>
</div>

<div id="policeDash" class="hidden">
<div class="card">
<h3>📊 ሁሉም ሪፖርት</h3>
<div id="reports"></div>
<canvas id="chart"></canvas>
</div>
</div>

<button id="logoutBtn" style="position:fixed;top:10px;right:10px;background:red;">Logout</button>

<div class="footer">
በቤንሻንጉል ጉምዝ ክልል ፖሊስ ኮሚሽን ቴክኖሎጂ ማስፋፊያ ክፍል የተሰራ
</div>

</div>

<script type="module">
import { db, auth, collection, addDoc, onSnapshot } from "./firebase.js";
import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const loginBtn=document.getElementById("loginBtn");
const loginBox=document.getElementById("loginBox");
const weredaDash=document.getElementById("weredaDash");
const policeDash=document.getElementById("policeDash");
const myReports=document.getElementById("myReports");
const reportsDiv=document.getElementById("reports");
const logoutBtn=document.getElementById("logoutBtn");

let currentUser=null;
let allReports=[];
let readIds=new Set(JSON.parse(localStorage.getItem("readIds")||"[]"));

loginBtn.onclick=async()=>{
 const email=document.getElementById("email").value;
 const password=document.getElementById("password").value;
 try{ await signInWithEmailAndPassword(auth,email,password);}catch(e){alert(e.message);} };

onAuthStateChanged(auth,(user)=>{
 if(user){
  currentUser=user;
  loginBox.style.display="none";
  weredaDash.classList.add("hidden");
  policeDash.classList.add("hidden");

  if(user.email === "policeregion551@gmail.com"){
    policeDash.classList.remove("hidden");
    loadAllReports();
  }else{
    weredaDash.classList.remove("hidden");
    loadMyReports();
  }
 }else{ loginBox.style.display="block"; }
});

logoutBtn.onclick=async()=>{ await signOut(auth); };

document.getElementById("sendBtn").onclick=async()=>{
 if(!currentUser) return;
 const data={
  region:region.value||"",
  zone:zone.value||"",
  wereda:wereda.value||"",
  station:station.value||"",
  crime:crime.value||"",
  desc:desc.value||"",
  reporterEmail:currentUser.email,
  createdAt:new Date().toISOString(),
  openedAt:null
 };
 await addDoc(collection(db,"reports"),data);
 alert("✅ ተልኳል");
};

function loadMyReports(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  myReports.innerHTML="";
  allReports=[];
  snap.forEach(doc=>{
   const d={id:doc.id,...doc.data()};
   if(d.reporterEmail===currentUser.email){
    allReports.push(d);
    myReports.innerHTML+=`<div class='report-item' onclick='viewReport("${d.id}")'>${d.crime} (${d.zone})</div>`;
   }
  });
 });
}

function loadAllReports(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  reportsDiv.innerHTML="";
  allReports=[];
  let zoneMap={};

  snap.forEach(doc=>{
   const d={id:doc.id,...doc.data()};
   allReports.push(d);
   if(!zoneMap[d.zone]) zoneMap[d.zone]={};
   if(!zoneMap[d.zone][d.wereda]) zoneMap[d.zone][d.wereda]=[];
   zoneMap[d.zone][d.wereda].push(d);
  });

  for(let z in zoneMap){
    reportsDiv.innerHTML+=`<h3>📁 ${z}</h3>`;
    for(let w in zoneMap[z]){
      reportsDiv.innerHTML+=`<h4>📂 ${w}</h4>`;
      zoneMap[z][w].forEach(r=>{
        let isNew=!readIds.has(r.id);
        reportsDiv.innerHTML+=`<div class='report-item ${isNew?"new":"read"}' onclick='viewReport("${r.id}")'>
        ${r.crime} ${isNew?"🔴 አዲስ":"✔ ታይቷል"}
        </div>`;
      });
    }
  }
  drawChart();
 });
}

window.viewReport=function(id){
 const r=allReports.find(x=>x.id===id);
 if(!r) return;
 readIds.add(id);
 localStorage.setItem("readIds",JSON.stringify([...readIds]));

 const w=window.open();
 w.document.write(`<h2>📄 ሙሉ ሪፖርት</h2>
 <p>ክልል: ${r.region}</p>
 <p>ዞን: ${r.zone}</p>
 <p>ወረዳ: ${r.wereda}</p>
 <p>ጣቢያ: ${r.station}</p>
 <p>ወንጀል: ${r.crime}</p>
 <p>መግለጫ: ${r.desc}</p>
 <button onclick="window.print()">🖨 Print</button>`);
};

function drawChart(){
 let counts={};
 allReports.forEach(r=>counts[r.zone]=(counts[r.zone]||0)+1);
 new Chart(document.getElementById("chart"),{
  type:'bar',
  data:{labels:Object.keys(counts),datasets:[{label:'Crime',data:Object.values(counts)}]}
 });
}

</script>
</body>
</html>
