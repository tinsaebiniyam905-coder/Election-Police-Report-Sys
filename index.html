<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8" />
  <title>የፖሊስ ሪፖርት ሲስተም</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { background: #0056b3; }
    .hidden { display: none; }

    .success {
      background: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .report-item {
      background: #f1f1f1;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🇪🇹 የፖሊስ ሪፖርት ሲስተም</h2>

  <!-- LOGIN -->
  <div class="card" id="loginBox">
    <h3>መግቢያ</h3>
    <input id="email" placeholder="ኢሜይል" />
    <input id="password" type="password" placeholder="ፓስዎርድ" />
    <button id="loginBtn">ግባ</button>
  </div>

  <!-- WEREDA -->
  <div id="weredaDash" class="hidden">
    <div class="card">
      <h3>📋 ሪፖርት መሙያ</h3>

      <input id="region" placeholder="ክልል" />
      <input id="zone" placeholder="ዞን" />
      <input id="wereda" placeholder="ወረዳ" />
      <input id="station" placeholder="ምርጫ ጣቢያ" />

      <input id="crime" placeholder="የወንጀል አይነት" />
      <input id="weapon" placeholder="መሳሪያ" />

      <textarea id="desc" placeholder="መግለጫ"></textarea>
      <input id="date" type="datetime-local" />
      <input id="officer" placeholder="ፖሊስ ስም" />

      <button id="submitBtn">ላክ</button>
      <div id="successMsg" class="success hidden">✅ ሪፖርት ተልኳል</div>
    </div>

    <div class="card">
      <h3>📁 የላኩት ሪፖርቶች</h3>
      <div id="myReports"></div>
    </div>
  </div>

  <!-- POLICE -->
  <div id="policeDash" class="hidden">
    <div class="card">
      <h3>📊 ሪፖርቶች</h3>
      <button id="refreshBtn">አድስ</button>
      <div id="reports"></div>
    </div>
  </div>

</div>

<script type="module">
import { db, auth, collection, addDoc, getDocs } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const loginBtn = document.getElementById("loginBtn");
const submitBtn = document.getElementById("submitBtn");
const refreshBtn = document.getElementById("refreshBtn");

const loginBox = document.getElementById("loginBox");
const weredaDash = document.getElementById("weredaDash");
const policeDash = document.getElementById("policeDash");

const successMsg = document.getElementById("successMsg");
const myReports = document.getElementById("myReports");
const reports = document.getElementById("reports");

loginBtn.addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);

    loginBox.style.display = "none";

    if (email.includes("wereda")) {
      weredaDash.classList.remove("hidden");
      loadMyReports();
    } else {
      policeDash.classList.remove("hidden");
      loadReports();
    }
  } catch (e) {
    alert("❌ ሎጊን አልተሳካም");
  }
});

submitBtn.addEventListener("click", async () => {
  await addDoc(collection(db, "reports"), {
    region: region.value,
    zone: zone.value,
    wereda: wereda.value,
    station: station.value,
    crime: crime.value,
    weapon: weapon.value,
    description: desc.value,
    date: date.value,
    officer: officer.value
  });

  successMsg.classList.remove("hidden");
  loadMyReports();
});

refreshBtn.addEventListener("click", loadReports);

async function loadMyReports() {
  const snapshot = await getDocs(collection(db, "reports"));
  myReports.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();
    myReports.innerHTML += `<div class='report-item'>${d.region} - ${d.crime}</div>`;
  });
}

async function loadReports() {
  const snapshot = await getDocs(collection(db, "reports"));
  reports.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();
    reports.innerHTML += `<div class='report-item'>${d.region} | ${d.zone} | ${d.crime}</div>`;
  });
}
</script>

</body>
</html>
