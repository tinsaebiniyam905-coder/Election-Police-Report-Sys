<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8" />
<title>የፖሊስ ሪፖርት ሲስተም</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:linear-gradient(135deg,#1f4037,#99f2c8);} 
.container{max-width:1100px;margin:auto;padding:20px;} 
.card{background:white;border-radius:15px;padding:20px;margin-top:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2);} 
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;} 
button{background:#28a745;color:white;padding:10px;border:none;border-radius:8px;cursor:pointer;} 
.hidden{display:none;} 
.report-item{background:#f1f1f1;margin:10px 0;padding:10px;border-radius:10px;cursor:pointer;} 
.new{background:#ffcccc;border-left:5px solid red;}
</style>
</head>

<body>
<div class="container">
<h2>🇪🇹 የፖሊስ ሪፖርት ሲስተም</h2>
<h4 style="color:gold;font-weight:bold;">ቤንሻንጉል ጉምዝ ክልል ፖሊስ ኮሚሽን</h4>

<div class="card" id="loginBox">
<input id="email" placeholder="email" />
<input id="password" type="password" placeholder="password" />
<button id="loginBtn">Login</button>
</div>

<div id="weredaDash" class="hidden">
<div class="card">
<h3>📋 ሪፖርት ፎርም</h3>
<input id="region" placeholder="ክልል" />
<input id="zone" placeholder="ዞን" />
<input id="wereda" placeholder="ወረዳ" />
<input id="station" placeholder="ጣቢያ" />
<input id="crime" placeholder="ወንጀል" />
<textarea id="desc" placeholder="መግለጫ"></textarea>
<button id="sendBtn">📤 ላክ</button>
</div>
</div>

<div id="policeDash" class="hidden">
<div class="card">
<h3>🔔 <span id="notify">0</span></h3>
<div id="reports"></div>
<canvas id="chart"></canvas>
<div id="ai"></div>
</div>
</div>

<button id="logoutBtn" style="position:fixed;top:10px;right:10px;background:red;">Logout</button>
</div>

<script type="module">
import { db, auth, collection, addDoc, onSnapshot } from "./firebase.js";
import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const loginBtn=document.getElementById("loginBtn");
const loginBox=document.getElementById("loginBox");
const weredaDash=document.getElementById("weredaDash");
const policeDash=document.getElementById("policeDash");
const reportsDiv=document.getElementById("reports");
const notify=document.getElementById("notify");
const aiDiv=document.getElementById("ai");
const sendBtn=document.getElementById("sendBtn");
const logoutBtn=document.getElementById("logoutBtn");

let allReports=[];
let seenIds=new Set();

loginBtn.onclick=async()=>{
 const email=document.getElementById("email").value;
 const password=document.getElementById("password").value;
 await signInWithEmailAndPassword(auth,email,password);
};

onAuthStateChanged(auth,(user)=>{
 if(user){
  loginBox.style.display="none";
  if(user.email.includes("wereda")){
    weredaDash.classList.remove("hidden");
  }else{
    policeDash.classList.remove("hidden");
    realtime();
  }
 }
});

logoutBtn.onclick=async()=>{
 await signOut(auth);
 location.reload();
};

// 📤 SEND WITH TIMESTAMP
sendBtn.onclick=async()=>{
 const data={
  region:region.value,
  zone:zone.value,
  wereda:wereda.value,
  station:station.value,
  crime:crime.value,
  desc:desc.value,
  createdAt:new Date().toISOString()
 };
 await addDoc(collection(db,"reports"),data);
 alert("✅ ተልኳል");
};

// 📡 REALTIME + GROUPING
function realtime(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  allReports=[];
  snap.forEach(doc=>{
   allReports.push({id:doc.id,...doc.data()});
  });
  notify.innerText=snap.size;
  render();
 });
}

// 📂 GROUP BY ZONE → WEREDA
function render(){
 reportsDiv.innerHTML="";
 let grouped={};

 allReports.forEach(r=>{
  if(!grouped[r.zone]) grouped[r.zone]={};
  if(!grouped[r.zone][r.wereda]) grouped[r.zone][r.wereda]=[];
  grouped[r.zone][r.wereda].push(r);
 });

 for(let zone in grouped){
  reportsDiv.innerHTML+=`<h3>📁 ${zone}</h3>`;
  for(let w in grouped[zone]){
    reportsDiv.innerHTML+=`<h4>📂 ${w}</h4>`;

    grouped[zone][w].forEach(r=>{
      let isNew=!seenIds.has(r.id);
      seenIds.add(r.id);

      reportsDiv.innerHTML+=`
      <div class='report-item ${isNew?"new":""}' onclick='viewReport("${r.id}")'>
        ${r.crime} <br>
        🕒 ${new Date(r.createdAt).toLocaleString()}
        ${isNew?"<b style='color:red'> NEW</b>":""}
      </div>`;
    });
  }
 }

 analyze();
}

window.viewReport=function(id){
 const r=allReports.find(x=>x.id===id);
 const w=window.open();
 w.document.write(`
 <h2>📄 ሪፖርት</h2>
 <p>${r.region}</p>
 <p>${r.zone}</p>
 <p>${r.wereda}</p>
 <p>${r.station}</p>
 <p>${r.crime}</p>
 <p>${r.desc}</p>
 <p>🕒 ${new Date(r.createdAt).toLocaleString()}</p>
 <button onclick="window.print()">Print</button>
 `);
};

function analyze(){
 let count={};
 allReports.forEach(r=>count[r.zone]=(count[r.zone]||0)+1);
 aiDiv.innerHTML="🔥 hotspot: "+Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b,"");
}

</script>
</body>
</html>
